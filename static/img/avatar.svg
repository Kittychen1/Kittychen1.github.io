<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 背景圆形 -->
  <circle cx="100" cy="100" r="95" fill="#FFF5F3"/>
  
  <!-- 猫脸轮廓 -->
  <ellipse cx="100" cy="115" rx="65" ry="60" fill="#FFE4B5"/>
  
  <!-- 左耳 -->
  <polygon points="55,75 45,40 75,65" fill="#FFE4B5" stroke="#E8B87A" stroke-width="2"/>
  <polygon points="60,70 52,50 70,62" fill="#FFB6C1"/>
  
  <!-- 右耳 -->
  <polygon points="145,75 155,40 125,65" fill="#FFE4B5" stroke="#E8B87A" stroke-width="2"/>
  <polygon points="140,70 148,50 130,62" fill="#FFB6C1"/>
  
  <!-- 脸颊腮红 -->
  <ellipse cx="65" cy="125" rx="18" ry="12" fill="#FFB6C1" opacity="0.6"/>
  <ellipse cx="135" cy="125" rx="18" ry="12" fill="#FFB6C1" opacity="0.6"/>
  
  <!-- 左眼 -->
  <ellipse cx="75" cy="110" rx="10" ry="12" fill="#333"/>
  <circle cx="72" cy="106" r="4" fill="#FFF"/>
  
  <!-- 右眼 -->
  <ellipse cx="125" cy="110" rx="10" ry="12" fill="#333"/>
  <circle cx="122" cy="106" r="4" fill="#FFF"/>
  
  <!-- 鼻子 -->
  <ellipse cx="100" cy="128" rx="6" ry="4" fill="#FFB6C1"/>
  
  <!-- 嘴巴 -->
  <path d="M 100 132 Q 92 142 85 138" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 100 132 Q 108 142 115 138" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- 胡须 -->
  <line x1="55" y1="130" x2="75" y2="128" stroke="#999" stroke-width="1"/>
  <line x1="55" y1="135" x2="75" y2="133" stroke="#999" stroke-width="1"/>
  <line x1="145" y1="130" x2="125" y2="128" stroke="#999" stroke-width="1"/>
  <line x1="145" y1="135" x2="125" y2="133" stroke="#999" stroke-width="1"/>
  
  <!-- 头顶小装饰 -->
  <circle cx="100" cy="55" r="8" fill="#FFB6C1"/>
</svg>