{{/* === CSDN 风格增强：阅读进度条 + 作者卡片 + Toast 集成 === */}}
{{ if and (eq .Section "post") (eq .Kind "page") }}

{{/* 1. 顶部阅读进度条 */}}
<div class="csdn-progress-bar" id="csdn-progress-bar"></div>

{{/* 2. Toast 样式 */}}
<link rel="stylesheet" href="/toast/toast.css">
<script src="/toast/toast.js" defer></script>

{{/* 3. 文章底部 CSDN 作者卡片 */}}
<div class="csdn-author-card">
    <div class="csdn-avatar">
        <img src="/img/avatar.jpg" alt="作者头像">
    </div>
    <div class="csdn-author-info">
        <h3 class="csdn-author-name">{{ .Site.Title }}</h3>
        <p class="csdn-author-desc">{{ .Site.Params.sidebar.subtitle }}</p>
    </div>
    <button class="csdn-follow-btn" onclick="navigator.clipboard.writeText(location.href)">关注</button>
</div>

{{/* 4. Toast 操作按钮栏 */}}
<div class="toast-action-bar">
    <button type="button" class="toast-action-btn" data-act="link">🔗 复制本文链接</button>
    <button type="button" class="toast-action-btn" data-act="top">⬆ 回到顶部</button>
    <button type="button" class="toast-action-btn" data-act="share">📤 分享文章</button>
</div>

{{/* 5. 所有交互逻辑 */}}
<script>
(function () {
    var progressBar = document.getElementById('csdn-progress-bar');

    function init() {
        // 5.1 阅读进度条
        if (progressBar) {
            function updateProgress() {
                var scrollTop = window.scrollY || document.documentElement.scrollTop;
                var docHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
                var percent = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
                progressBar.style.width = percent + '%';
            }
            window.addEventListener('scroll', updateProgress, { passive: true });
            updateProgress();
        }

        // 5.2 Toast 交互 - 代码复制
        document.addEventListener('click', function (e) {
            var btn = e.target.closest && e.target.closest('.copyCodeButton');
            if (!btn) return;
            var code = btn.parentElement && btn.parentElement.querySelector('code[data-lang]');
            if (!code) return;
            navigator.clipboard.writeText(code.textContent)
                .then(function () { Toast.success('代码已复制'); })
                .catch(function () { Toast.error('复制失败，请手动选择复制'); });
        }, true);

        // 5.3 底部按钮点击
        var bar = document.querySelector('.toast-action-bar');
        if (bar) {
            bar.addEventListener('click', function (e) {
                var b = e.target.closest('.toast-action-btn');
                if (!b) return;
                var act = b.getAttribute('data-act');
                if (act === 'link') {
                    navigator.clipboard.writeText(location.href)
                        .then(function () { Toast.success('本文链接已复制'); })
                        .catch(function () { Toast.error('复制链接失败'); });
                } else if (act === 'top') {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                    Toast.success('已回到顶部');
                } else if (act === 'share') {
                    var url = location.href;
                    var title = document.title;
                    if (navigator.share) {
                        navigator.share({ title: title, url: url }).catch(function () {});
                    } else {
                        navigator.clipboard.writeText(url)
                            .then(function () { Toast.success('分享链接已复制'); })
                            .catch(function () { Toast.error('分享失败'); });
                    }
                }
            });
        }

        // 5.4 关注按钮
        var followBtn = document.querySelector('.csdn-follow-btn');
        if (followBtn) {
            followBtn.addEventListener('click', function () {
                Toast.success('感谢关注 ❤️');
            });
        }
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
    if (!window.Toast) {
        var t = setInterval(function () { if (window.Toast) { clearInterval(t); init(); } }, 50);
        setTimeout(function () { clearInterval(t); }, 4000);
    }
})();
</script>

{{ end }}
