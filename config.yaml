# ↓↓↓ 上线后必须改成你的真实地址！本地预览阶段先保持这样也行 ↓↓↓
baseURL: "https://Kittychen1.github.io/"
languageCode: "zh-cn"
locale: "zh-cn"
theme: "hugo-theme-stack"
title: "Kittychen1-1"
copyright: "© 2026 Kittychen"

# 分页：每页显示几篇文章
pagination:
  pagerSize: 6

# ============================================
# Stack 主题的核心配置（增强美观版）
# ============================================
params:
  # ---------- 配色方案 ----------
  colorScheme:
    default: auto
    toggle: true

  # ---------- 内容设置 ----------
  mainSections:
    - post
  featuredImageField: image
  rssFullContent: true
  favicon: ""

  # ---------- 侧边栏信息（增强） ----------
  sidebar:
    subtitle: "探索 AI · 分享成长"
    avatar: img/avatar.png

  # ---------- 文章显示设置 ----------
  article:
    math: false
    toc: true
    readingTime: true               # 显示预计阅读时间
    showDate: true                  # 显示文章日期
    showEdit: false
    showAuthor: true

  # ---------- 首页布局 ----------
  home:
    showPageTitle: true
    showFeaturedImage: true
    showSummary: true               # 在首页显示文章摘要

  # ---------- 评论（先关掉） ----------
  comments:
    enabled: false

  # ---------- 页脚自定义 ----------
  footer:
    since: 2026                     # 显示网站起始年份
    customText: "用 ❤️ 和 Hugo 构建"

# ============================================
# 菜单设置（增强导航体验）
# ============================================
menu:
  # 主菜单（显示在顶部导航栏）
  main:
    - name: "🏠 首页"
      url: "/"
      weight: 1
    - name: "📝 归档"
      url: "/archives/"
      weight: 2
    - name: "🏷️ 标签"
      url: "/tags/"
      weight: 3
    - name: "📂 分类"
      url: "/categories/"
      weight: 4
    - name: "ℹ️ 关于"
      url: "/about/"
      weight: 5

  # 社交链接（显示在侧边栏）
  social:
    - identifier: github
      name: GitHub
      url: "https://github.com/Kittychen1"
      params:
        icon: brand-github

# ============================================
# 文章格式与代码高亮
# ============================================
markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false